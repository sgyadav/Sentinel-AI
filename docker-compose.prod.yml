services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sentinel-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/sentinel.db}
      SENTINEL_CORS_ORIGINS: ${SENTINEL_CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - sentinel_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /ws
    container_name: sentinel-frontend
    ports:
      - "${SENTINEL_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sentinel_data:
